plugins {
    id 'com.android.application' version '8.6.1'
}

repositories {
    google()
    mavenCentral()
}

android {
    namespace 'com.chk.apkinstaller'
    compileSdk 35

    defaultConfig {
        applicationId 'com.chk.apkinstaller'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
}
